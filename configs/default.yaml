# Default experiment configuration.
# Consumed by scripts if you wire in a YAML loader; also documents sane defaults.

model:
  name: resnet50          # small_cnn | resnet18 | resnet50 | vgg16 | densenet121 | mobilenet_v3_large
  pretrained: true
  checkpoint: null         # path for small_cnn weights

dataset:
  name: imagenet_sample    # cifar10 | fashion_mnist | imagenet_sample
  root: ./data
  batch_size: 16
  image_size: 224

explainers:
  - gradcam
  - gradcam++
  - scorecam
  - integrated_gradients
  - smoothgrad
  - occlusion
  - rise
  - lrp

# Per-method hyper-parameters (optional overrides).
params:
  integrated_gradients: { steps: 50 }
  smoothgrad:           { n_samples: 25, noise_level: 0.15 }
  occlusion:            { patch: 16, stride: 8 }
  rise:                 { n_masks: 2000, mask_res: 7 }
  scorecam:             { batch_size: 32 }

metrics:
  enabled: true
  deletion_insertion_steps: 50

output:
  dir: ./assets
